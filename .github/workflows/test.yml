name: Tests

on:
  push:
    branches: [master, main, "260720-refactor-engine-audit"]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Lean engine tests
        run: |
          OUTPUT=$(node tests/test_zero_apex_lean.js 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "FAILURES"; then
            echo "::error::Engine tests failed"
            exit 1
          fi

      - name: Coverage gate (minimum assertions)
        run: |
          # Count PASS lines in test output
          PASS_COUNT=$(node tests/test_zero_apex_lean.js 2>&1 | grep -c "PASS:")
          echo "Passed assertions: $PASS_COUNT"
          if [ "$PASS_COUNT" -lt 30 ] 2>/dev/null; then
            echo "::error::Test coverage below threshold (30)"
            exit 1
          fi
          echo "Coverage gate: PASSED"
