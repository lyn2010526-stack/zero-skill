version: 1
name: self_improvement
rules:
  - id: improvement.rule_candidate_requires_test
    source: AutoSkill / Evolver / Skill-RSI
    trigger: reusable_pattern_found
    action:
      - generate_rule_candidate
      - test_on_history_cases
      - register_only_if_success_rate_gte_0_7
    verify:
      - candidate_has_trigger
      - candidate_has_action
      - candidate_has_validation
    forbid:
      - directly_modify_core_skill_without_test
