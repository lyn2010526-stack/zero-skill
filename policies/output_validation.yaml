version: 1
name: output_validation
rules:
  - id: output.no_false_completion
    source: execution-verifier / skills-validator
    trigger: before_final_answer
    action:
      - scan_completion_claims
      - require_evidence
      - downgrade_unverified_claims
    verify:
      - completion_claim_has_tool_evidence

  - id: output.confidence_labels
    source: anti-hallucination
    trigger: factual_claim
    action:
      - attach_confidence_label
      - attach_verification_level
