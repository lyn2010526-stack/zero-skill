version: 1
name: planning
rules:
  - id: planning.complex_task_requires_plan
    source: fathom-mode / Prompt Architect / JetBrains skills
    trigger: task_received
    condition:
      complexity: high
    action:
      - restate_goal
      - list_constraints
      - list_steps
      - define_verification
      - define_rollback
    verify:
      - plan_has_goal
      - plan_has_verification
      - plan_has_rollback
    fallback:
      - ask_user_for_missing_information

  - id: planning.simple_task_direct_execute
    source: engineering_practice
    trigger: task_received
    condition:
      complexity: low
    action:
      - execute_directly
    verify:
      - result_has_evidence
